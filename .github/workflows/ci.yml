name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: go mod download

      - name: Run migrations
        run: go run ./cmd/api -migrate
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: myecommerce
          DB_SSLMODE: disable

      - name: Run tests
        run: go test ./... -v
        env:
          TEST_DB_URL: postgres://user:password@localhost:5432/myecommerce?sslmode=disable
          REDIS_URL: redis://localhost:6379
